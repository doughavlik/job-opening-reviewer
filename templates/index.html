<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job Opening Reviewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { padding-top: 1.5rem; }
    .truncate { max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .excerpt { font-size: 0.85rem; color: #555; max-width: 420px; }
    .status-pending { color: #6c757d; }
    .status-queued  { color: #0d6efd; }
    .status-running { color: #0dcaf0; }
    .status-done    { color: #198754; }
    .status-error   { color: #dc3545; }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable.asc::after  { content: " \25B2"; font-size: 0.7em; }
    th.sortable.desc::after { content: " \25BC"; font-size: 0.7em; }
    .job-desc-cell { min-width: 220px; max-width: 320px; }
    .job-desc-preview { font-size: 0.78rem; color: #444; white-space: pre-wrap; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; }
    #openingsTable { table-layout: fixed; width: 100%; }
    #openingsTable th { position: relative; overflow: hidden; white-space: nowrap; }
    .resize-handle {
      position: absolute; right: 0; top: 0;
      width: 5px; height: 100%;
      cursor: col-resize; user-select: none;
    }
    .resize-handle:hover, .resize-handle.active { background: rgba(0,0,0,0.15); }
  </style>
</head>
<body>
<div class="container-fluid px-4">

  <h1 class="mb-3"><i class="bi bi-briefcase"></i> Job Opening Reviewer</h1>

  <ul class="nav nav-tabs" id="mainTabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="openings-tab" data-bs-toggle="tab"
              data-bs-target="#openings" type="button" role="tab">Job Openings</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="settings-tab" data-bs-toggle="tab"
              data-bs-target="#settings" type="button" role="tab">Settings</button>
    </li>
  </ul>

  <div class="tab-content pt-3">

    <!-- Job Openings ---------------------------------------------------- -->
    <div class="tab-pane fade show active" id="openings" role="tabpanel">

      <div class="mb-3 d-flex gap-2 align-items-center flex-wrap">
        <button class="btn btn-primary" id="btnAdd">
          <i class="bi bi-plus-lg"></i> Add Job Opening
        </button>
        <button class="btn btn-outline-secondary" id="btnRefresh">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
        <div class="dropdown">
          <button class="btn btn-outline-secondary dropdown-toggle" type="button"
                  id="btnColumns" data-bs-toggle="dropdown" data-bs-auto-close="outside">
            <i class="bi bi-layout-three-columns"></i> Columns
          </button>
          <ul class="dropdown-menu" id="columnMenu"></ul>
        </div>
      </div>

      <div id="addForm" class="card mb-3 d-none">
        <div class="card-body">
          <div class="input-group">
            <input type="url" id="addUrl" class="form-control"
                   placeholder="https://example.com/jobs/12345">
            <button class="btn btn-success" id="addSave">Save</button>
            <button class="btn btn-outline-secondary" id="addCancel">Cancel</button>
          </div>
        </div>
      </div>

      <div style="overflow-x: auto;">
        <table id="openingsTable" class="table table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th data-col-key="id" class="sortable" data-col="id">#</th>
              <th data-col-key="url" class="sortable" data-col="url">Job Opening URL</th>
              <th data-col-key="industry_experience" class="sortable" data-col="industry_experience">Industry Experience</th>
              <th data-col-key="industry_excerpt">Excerpt</th>
              <th data-col-key="recruiter" class="sortable" data-col="recruiter_name">Recruiter</th>
              <th data-col-key="status" class="sortable" data-col="status">Status</th>
              <th data-col-key="markdown">Job Description</th>
              <th data-col-key="actions">Actions</th>
            </tr>
          </thead>
          <tbody id="openingsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Settings -------------------------------------------------------- -->
    <div class="tab-pane fade" id="settings" role="tabpanel">
      <div class="card" style="max-width: 560px;">
        <div class="card-body">
          <h5 class="card-title">Google Gemini API key</h5>
          <p class="text-muted small">Stored locally in SQLite. Leave blank to keep the current value.</p>
          <div class="mb-3">
            <label for="apiKeyInput" class="form-label">API key</label>
            <input type="password" id="apiKeyInput" class="form-control" autocomplete="off">
            <div class="form-text" id="apiKeyStatus"></div>
          </div>
          <button class="btn btn-primary" id="saveSettings">Save</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Recruiter modal -->
<div class="modal fade" id="recruiterModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-person-badge"></i> Recruiters</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="recruiterModalBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ----- Simple AJAX helpers ------------------------------------------------
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { "Content-Type": "application/json" },
    ...opts,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

// ----- Column definitions -------------------------------------------------
const COLUMNS = [
  { key: "id",                  label: "#",                   sortCol: "id",                  sortable: true,  hideable: true,  defaultWidth: 50  },
  { key: "url",                 label: "Job Opening URL",     sortCol: "url",                 sortable: true,  hideable: true,  defaultWidth: 220 },
  { key: "industry_experience", label: "Industry Experience", sortCol: "industry_experience", sortable: true,  hideable: true,  defaultWidth: 160 },
  { key: "industry_excerpt",    label: "Excerpt",                                             sortable: false, hideable: true,  defaultWidth: 200 },
  { key: "recruiter",            label: "Recruiter",           sortCol: "recruiter_name",      sortable: true,  hideable: true,  defaultWidth: 200 },
  { key: "status",              label: "Status",              sortCol: "status",              sortable: true,  hideable: true,  defaultWidth: 90  },
  { key: "markdown",            label: "Job Description",                                     sortable: false, hideable: true,  defaultWidth: 260 },
  { key: "actions",             label: "Actions",                                             sortable: false, hideable: false, defaultWidth: 280 },
];

// ----- Persistence helpers ------------------------------------------------
function loadPref(key, def) {
  try { return JSON.parse(localStorage.getItem(key) ?? "null") ?? def; }
  catch { return def; }
}
function savePref(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

// ----- State --------------------------------------------------------------
let openings = [];
let sortCol = loadPref("jobReviewer_sortCol", "id");
let sortAsc  = loadPref("jobReviewer_sortAsc", false);
let colVisibility = loadPref("jobReviewer_colVis", {});
let colWidths     = loadPref("jobReviewer_colWidths", {});

// Default: all columns visible unless explicitly hidden
COLUMNS.forEach(col => {
  if (colVisibility[col.key] === undefined) colVisibility[col.key] = true;
});

// ----- Column visibility --------------------------------------------------
function applyColVisibility() {
  COLUMNS.forEach(col => {
    const show = col.hideable ? colVisibility[col.key] !== false : true;
    document.querySelectorAll(`[data-col-key="${col.key}"]`).forEach(el => {
      el.style.display = show ? "" : "none";
    });
  });
}

// ----- Column widths ------------------------------------------------------
function applyColWidths() {
  COLUMNS.forEach(col => {
    const th = document.querySelector(`th[data-col-key="${col.key}"]`);
    if (!th) return;
    const w = colWidths[col.key] || col.defaultWidth;
    th.style.width = w + "px";
  });
}

function saveColWidths() {
  const widths = {};
  document.querySelectorAll("#openingsTable thead th[data-col-key]").forEach(th => {
    widths[th.dataset.colKey] = th.offsetWidth;
  });
  colWidths = widths;
  savePref("jobReviewer_colWidths", widths);
}

// ----- Resize handles -----------------------------------------------------
let resizingState = null;

function initResizeHandles() {
  document.querySelectorAll("#openingsTable thead th").forEach(th => {
    const handle = document.createElement("div");
    handle.className = "resize-handle";
    th.appendChild(handle);
    handle.addEventListener("mousedown", e => {
      e.preventDefault();
      e.stopPropagation();
      resizingState = { th, startX: e.pageX, startW: th.offsetWidth };
      handle.classList.add("active");
    });
  });
}

document.addEventListener("mousemove", e => {
  if (!resizingState) return;
  const w = Math.max(40, resizingState.startW + (e.pageX - resizingState.startX));
  resizingState.th.style.width = w + "px";
});

document.addEventListener("mouseup", () => {
  if (resizingState) {
    resizingState.th.querySelector(".resize-handle")?.classList.remove("active");
    saveColWidths();
    resizingState = null;
  }
});

// ----- Column menu --------------------------------------------------------
function buildColumnMenu() {
  const menu = document.getElementById("columnMenu");
  menu.innerHTML = "";
  COLUMNS.filter(col => col.hideable).forEach(col => {
    const li = document.createElement("li");
    const label = document.createElement("label");
    label.className = "dropdown-item d-flex align-items-center gap-2";
    label.style.cursor = "pointer";
    const chk = document.createElement("input");
    chk.type = "checkbox";
    chk.checked = colVisibility[col.key] !== false;
    chk.addEventListener("change", () => {
      colVisibility[col.key] = chk.checked;
      savePref("jobReviewer_colVis", colVisibility);
      applyColVisibility();
    });
    label.appendChild(chk);
    label.appendChild(document.createTextNode("\u00a0" + col.label));
    li.appendChild(label);
    menu.appendChild(li);
  });
}

// ----- Rendering ----------------------------------------------------------
function renderOpenings() {
  const sorted = [...openings].sort((a, b) => {
    const av = a[sortCol] ?? "";
    const bv = b[sortCol] ?? "";
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });
  const tbody = document.getElementById("openingsBody");
  tbody.innerHTML = "";
  for (const row of sorted) {
    tbody.appendChild(buildRow(row));
  }
  document.querySelectorAll("th.sortable").forEach(th => {
    th.classList.remove("asc", "desc");
    if (th.dataset.col === sortCol) th.classList.add(sortAsc ? "asc" : "desc");
  });
  applyColVisibility();
}

function buildRow(row) {
  const tr = document.createElement("tr");
  tr.dataset.id = row.id;

  // ID
  const tdId = document.createElement("td");
  tdId.dataset.colKey = "id";
  tdId.textContent = row.id;
  tr.appendChild(tdId);

  // URL (editable)
  const tdUrl = document.createElement("td");
  tdUrl.dataset.colKey = "url";
  const aUrl = document.createElement("a");
  aUrl.href = row.url;
  aUrl.target = "_blank";
  aUrl.rel = "noopener";
  aUrl.className = "truncate d-inline-block";
  aUrl.textContent = row.url;
  aUrl.title = row.url;
  tdUrl.appendChild(aUrl);
  tr.appendChild(tdUrl);

  // Industry
  const tdInd = document.createElement("td");
  tdInd.dataset.colKey = "industry_experience";
  tdInd.textContent = row.industry_experience || "";
  tr.appendChild(tdInd);

  // Excerpt
  const tdEx = document.createElement("td");
  tdEx.dataset.colKey = "industry_excerpt";
  tdEx.className = "excerpt";
  tdEx.textContent = row.industry_excerpt || "";
  tr.appendChild(tdEx);

  // Recruiter
  const tdRec = document.createElement("td");
  tdRec.dataset.colKey = "recruiter";
  renderRecruiterCell(tdRec, row);
  tr.appendChild(tdRec);

  // Status
  const tdStatus = document.createElement("td");
  tdStatus.dataset.colKey = "status";
  tdStatus.className = "status-" + (row.status || "pending");
  tdStatus.textContent = row.status || "pending";
  if (row.error) tdStatus.title = row.error;
  tr.appendChild(tdStatus);

  // Job Description
  const tdMd = document.createElement("td");
  tdMd.dataset.colKey = "markdown";
  tdMd.className = "job-desc-cell";
  if (row.markdown) {
    const preview = document.createElement("div");
    preview.className = "job-desc-preview";
    preview.textContent = row.markdown;
    const btnCopy = document.createElement("button");
    btnCopy.className = "btn btn-sm btn-outline-secondary mt-1";
    btnCopy.innerHTML = '<i class="bi bi-clipboard"></i> Copy';
    btnCopy.title = "Copy job description to clipboard";
    btnCopy.onclick = () => {
      navigator.clipboard.writeText(row.markdown).then(() => {
        btnCopy.innerHTML = '<i class="bi bi-clipboard-check"></i> Copied!';
        setTimeout(() => { btnCopy.innerHTML = '<i class="bi bi-clipboard"></i> Copy'; }, 2000);
      }).catch(() => alert("Clipboard write failed"));
    };
    tdMd.appendChild(preview);
    tdMd.appendChild(btnCopy);
  } else {
    tdMd.innerHTML = '<span class="text-muted small">&mdash;</span>';
  }
  tr.appendChild(tdMd);

  // Actions
  const tdAct = document.createElement("td");
  tdAct.dataset.colKey = "actions";
  tdAct.innerHTML = `
    <button class="btn btn-sm btn-outline-primary me-1 btn-run"  title="Run Now"><i class="bi bi-play-fill"></i> Run Now</button>
    <button class="btn btn-sm btn-outline-secondary me-1 btn-edit" title="Edit"><i class="bi bi-pencil"></i></button>
    <button class="btn btn-sm btn-outline-danger btn-del"    title="Delete"><i class="bi bi-trash"></i></button>
  `;
  tdAct.querySelector(".btn-run").onclick   = () => runRow(row.id);
  tdAct.querySelector(".btn-edit").onclick  = () => startEdit(tr, row);
  tdAct.querySelector(".btn-del").onclick   = () => deleteRow(row.id);
  tr.appendChild(tdAct);

  return tr;
}

function parseAlternates(raw) {
  if (!raw) return [];
  try {
    const v = JSON.parse(raw);
    return Array.isArray(v) ? v : [];
  } catch {
    return [];
  }
}

function renderRecruiterCell(td, row) {
  td.innerHTML = "";
  const name = (row.recruiter_name || "").trim();
  const linkedin = (row.recruiter_linkedin || "").trim();
  const alternates = parseAlternates(row.alternate_recruiters);

  if (!name && !linkedin && alternates.length === 0) {
    td.innerHTML = '<span class="text-muted small">&mdash;</span>';
    return;
  }

  const wrap = document.createElement("div");
  wrap.style.cursor = "pointer";
  wrap.title = "Click to see alternate recruiters";

  if (name) {
    const span = document.createElement("span");
    span.textContent = name;
    wrap.appendChild(span);
  } else {
    const span = document.createElement("span");
    span.className = "text-muted small";
    span.textContent = "(unnamed)";
    wrap.appendChild(span);
  }

  if (linkedin) {
    wrap.appendChild(document.createTextNode(" "));
    const a = document.createElement("a");
    a.href = linkedin;
    a.target = "_blank";
    a.rel = "noopener";
    a.innerHTML = '<i class="bi bi-linkedin"></i>';
    a.title = linkedin;
    a.onclick = e => e.stopPropagation();
    wrap.appendChild(a);
  }

  if (alternates.length > 0) {
    const badge = document.createElement("span");
    badge.className = "badge bg-secondary ms-2";
    badge.textContent = "+" + alternates.length;
    wrap.appendChild(badge);
  }

  wrap.onclick = () => showRecruiterModal(row);
  td.appendChild(wrap);
}

function showRecruiterModal(row) {
  const name = (row.recruiter_name || "").trim();
  const linkedin = (row.recruiter_linkedin || "").trim();
  const alternates = parseAlternates(row.alternate_recruiters);

  const body = document.getElementById("recruiterModalBody");
  body.innerHTML = "";

  const primaryHdr = document.createElement("h6");
  primaryHdr.textContent = "Primary recruiter";
  body.appendChild(primaryHdr);
  body.appendChild(renderRecruiterItem(name, linkedin, true));

  const altHdr = document.createElement("h6");
  altHdr.className = "mt-3";
  altHdr.textContent = "Alternate recruiters";
  body.appendChild(altHdr);

  if (alternates.length === 0) {
    const p = document.createElement("p");
    p.className = "text-muted small mb-0";
    p.textContent = "No alternates suggested.";
    body.appendChild(p);
  } else {
    const ul = document.createElement("ul");
    ul.className = "list-unstyled mb-0";
    for (const alt of alternates) {
      const li = document.createElement("li");
      li.className = "mb-1";
      li.appendChild(renderRecruiterItem(alt.name, alt.linkedin, false));
      ul.appendChild(li);
    }
    body.appendChild(ul);
  }

  bootstrap.Modal.getOrCreateInstance(document.getElementById("recruiterModal")).show();
}

function renderRecruiterItem(name, linkedin, bold) {
  const span = document.createElement("span");
  const nameEl = document.createElement(bold ? "strong" : "span");
  nameEl.textContent = name || "(unnamed)";
  span.appendChild(nameEl);
  if (linkedin) {
    span.appendChild(document.createTextNode(" "));
    const a = document.createElement("a");
    a.href = linkedin;
    a.target = "_blank";
    a.rel = "noopener";
    a.innerHTML = '<i class="bi bi-linkedin"></i> LinkedIn';
    span.appendChild(a);
  }
  return span;
}

function startEdit(tr, row) {
  const tdUrl = tr.querySelector('[data-col-key="url"]');
  tdUrl.innerHTML = `<input class="form-control form-control-sm" value="${row.url.replace(/"/g, "&quot;")}">`;
  const input = tdUrl.querySelector("input");

  const tdAct = tr.querySelector('[data-col-key="actions"]');
  tdAct.innerHTML = `
    <button class="btn btn-sm btn-success me-1 btn-save">Save</button>
    <button class="btn btn-sm btn-outline-secondary btn-cancel">Cancel</button>
  `;
  tdAct.querySelector(".btn-save").onclick = async () => {
    try {
      await api(`/api/openings/${row.id}`, {
        method: "PUT",
        body: JSON.stringify({ url: input.value.trim() }),
      });
      await loadOpenings();
    } catch (e) { alert("Save failed: " + e.message); }
  };
  tdAct.querySelector(".btn-cancel").onclick = () => loadOpenings();
  input.focus();
}

async function runRow(id) {
  try {
    await api(`/api/openings/${id}/run`, { method: "POST" });
    await loadOpenings();
  } catch (e) { alert("Run failed: " + e.message); }
}

async function deleteRow(id) {
  if (!confirm("Delete this job opening?")) return;
  try {
    await api(`/api/openings/${id}`, { method: "DELETE" });
    await loadOpenings();
  } catch (e) { alert("Delete failed: " + e.message); }
}

// ----- Data fetch + polling ----------------------------------------------
async function loadOpenings() {
  openings = await api("/api/openings");
  renderOpenings();
}

async function pollIfRunning() {
  if (openings.some(r => r.status === "queued" || r.status === "running")) {
    await loadOpenings();
  }
}
setInterval(pollIfRunning, 2000);

// ----- Add flow -----------------------------------------------------------
document.getElementById("btnAdd").onclick = () => {
  document.getElementById("addForm").classList.remove("d-none");
  document.getElementById("addUrl").focus();
};
document.getElementById("addCancel").onclick = () => {
  document.getElementById("addForm").classList.add("d-none");
  document.getElementById("addUrl").value = "";
};
document.getElementById("addSave").onclick = async () => {
  const url = document.getElementById("addUrl").value.trim();
  if (!url) return;
  try {
    await api("/api/openings", {
      method: "POST",
      body: JSON.stringify({ url }),
    });
    document.getElementById("addUrl").value = "";
    document.getElementById("addForm").classList.add("d-none");
    await loadOpenings();
  } catch (e) { alert("Add failed: " + e.message); }
};
document.getElementById("btnRefresh").onclick = loadOpenings;

// ----- Sorting ------------------------------------------------------------
document.querySelectorAll("th.sortable").forEach(th => {
  th.onclick = () => {
    const col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    savePref("jobReviewer_sortCol", sortCol);
    savePref("jobReviewer_sortAsc", sortAsc);
    renderOpenings();
  };
});

// ----- Settings -----------------------------------------------------------
async function loadSettings() {
  const s = await api("/api/settings");
  const input = document.getElementById("apiKeyInput");
  document.getElementById("apiKeyStatus").textContent =
    s.gemini_api_key_set ? "A key is currently saved." : "No key set.";
  input.placeholder = s.gemini_api_key_set ? "\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022 (saved)" : "";
  input.value = "";
}
document.getElementById("saveSettings").onclick = async () => {
  const v = document.getElementById("apiKeyInput").value.trim();
  await api("/api/settings", {
    method: "PUT",
    body: JSON.stringify({ gemini_api_key: v }),
  });
  await loadSettings();
  alert("Settings saved.");
};
document.getElementById("settings-tab").addEventListener("shown.bs.tab", loadSettings);

// ----- Initial setup ------------------------------------------------------
buildColumnMenu();
initResizeHandles();
applyColWidths();
loadOpenings();
loadSettings();
</script>
</body>
</html>
